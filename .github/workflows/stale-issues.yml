name: Close Stale Issues (reusable)

on:
  workflow_call:
    inputs:
      only_labels:
        required: false
        type: string
        default: 'needs-info'
      days_before_stale:
        required: false
        type: number
        default: 14
      days_before_close:
        required: false
        type: number
        default: 7
      stale_message:
        required: false
        type: string
        default: |
          > **Automated reply** from a bot.

          This issue is still missing the requested debug log and hasn't had a reply in a while. It'll be closed in 7 days if nothing's added. Just reply with the log to keep it open.

          _This was posted automatically._
      close_message:
        required: false
        type: string
        default: |
          > **Automated reply** from a bot.

          Closing since no debug log was added. Add one any time and this can be reopened.

          _This was posted automatically._

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/stale@v10
        with:
          only-labels: ${{ inputs.only_labels }}
          days-before-stale: ${{ inputs.days_before_stale }}
          days-before-close: ${{ inputs.days_before_close }}
          stale-issue-label: stale
          remove-stale-when-updated: true
          days-before-pr-stale: -1
          days-before-pr-close: -1
          stale-issue-message: ${{ inputs.stale_message }}
          close-issue-message: ${{ inputs.close_message }}
