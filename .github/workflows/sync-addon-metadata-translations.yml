name: Sync addon metadata translations (reusable)

on:
  workflow_call:

jobs:
  sync-translations:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          path: project

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install git+https://github.com/xbmc/sync_addon_metadata_translations.git

      - name: Run sync-addon-metadata-translations
        run: sync-addon-metadata-translations
        working-directory: ./project

      - name: Commit metadata sync
        working-directory: ./project
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No metadata changes to sync."
            exit 0
          fi
          git config user.name "MikeSiLVO"
          git config user.email "mikesilvo164@gmail.com"
          git add -A
          git commit -m "Sync of addon metadata translations"
          git push origin HEAD:main
