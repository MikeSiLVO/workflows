name: Deploy to repository (reusable)

on:
  workflow_call:
    inputs:
      channel:
        description: 'Repository channel directory'
        required: false
        type: string
        default: piers
      repo_target:
        description: 'Target repository name under MikeSiLVO/'
        required: false
        type: string
        default: repository.silvo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout addon source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Extract addon metadata
        id: metadata
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import os

          root = ET.parse('addon.xml').getroot()
          addon_id = root.get('id')
          version = root.get('version')
          print(f"Addon: {addon_id}")
          print(f"Version: {version}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"addon_id={addon_id}\n")
              f.write(f"version={version}\n")
          EOF

      - name: Package addon
        id: package
        run: |
          python3 << 'EOF'
          import zipfile
          import os
          from pathlib import Path

          addon_id = "${{ steps.metadata.outputs.addon_id }}"
          version = "${{ steps.metadata.outputs.version }}"
          zip_name = f"{addon_id}-{version}.zip"

          exclude_names = {
              '.git', '.github', '.gitignore', '.gitattributes',
              '.claude', '.vscode', '.idea',
              '.pylintrc', 'pyrightconfig.json', 'ruff.toml', 'pyproject.toml',
              '__pycache__', '.mypy_cache', '.ruff_cache', '.pytest_cache',
              'typings', 'tests', 'docs', 'DOCS', 'xbmcgui',
              'README.md', 'CHANGELOG.md',
              '.DS_Store', 'Thumbs.db', 'desktop.ini',
          }
          exclude_suffixes = (
              '.pyc', '.pyo', '.pyd', '.log', '.tmp', '.bak', '.swp', '.swo',
              '.sublime-project', '.sublime-workspace',
          )

          def should_exclude(name):
              return name in exclude_names or name.endswith(exclude_suffixes)

          file_count = 0
          with zipfile.ZipFile(zip_name, 'w', zipfile.ZIP_DEFLATED) as zipf:
              for root, dirs, files in os.walk('.'):
                  dirs[:] = [d for d in dirs if not should_exclude(d)]
                  for file in files:
                      if should_exclude(file) or file == zip_name:
                          continue
                      file_path = Path(root) / file
                      arcname = Path(addon_id) / file_path.relative_to('.')
                      zipf.write(file_path, arcname)
                      file_count += 1

          size_mb = os.path.getsize(zip_name) / (1024 * 1024)
          print(f"Created {zip_name} ({file_count} files, {size_mb:.1f} MB)")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"zip_name={zip_name}\n")
          EOF

      - name: Clone target repository
        env:
          TARGET: ${{ inputs.repo_target }}
          PAT: ${{ secrets.REPO_SILVO_PAT }}
        run: |
          git clone "https://x-access-token:${PAT}@github.com/MikeSiLVO/${TARGET}.git" repo-silvo
          cd repo-silvo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Deploy to channel
        env:
          ADDON_ID: ${{ steps.metadata.outputs.addon_id }}
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          DEST="repo-silvo/${CHANNEL}/${ADDON_ID}"
          mkdir -p "$DEST"
          rm -f "$DEST"/*.zip
          cp "$ZIP_NAME" "$DEST/"
          for file in addon.xml changelog.txt; do
            [ -f "$file" ] && cp "$file" "$DEST/"
          done
          for asset in icon.png fanart.jpg; do
            if [ -f "resources/$asset" ]; then cp "resources/$asset" "$DEST/$asset";
            elif [ -f "resources/media/$asset" ]; then cp "resources/media/$asset" "$DEST/$asset";
            elif [ -f "$asset" ]; then cp "$asset" "$DEST/";
            fi
          done

      - name: Generate repository metadata
        run: |
          cd repo-silvo
          python _repo_generator.py

      - name: Commit and push
        env:
          ADDON_ID: ${{ steps.metadata.outputs.addon_id }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          cd repo-silvo
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy: ${ADDON_ID} v${VERSION}" \
                       -m "Source: ${{ github.repository }}@${{ github.sha }}" \
                       -m "Trigger: ${{ github.ref_name }}"
            git pull --rebase
            git push
          fi

      - name: Summary
        env:
          ADDON_ID: ${{ steps.metadata.outputs.addon_id }}
          VERSION: ${{ steps.metadata.outputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          {
            echo "## Deployment Complete"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Addon | ${ADDON_ID} |"
            echo "| Version | ${VERSION} |"
            echo "| Channel | ${CHANNEL} |"
          } >> "$GITHUB_STEP_SUMMARY"
