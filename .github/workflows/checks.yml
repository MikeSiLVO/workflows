name: Code checks (reusable)

on:
  workflow_call:
    inputs:
      deps:
        description: Extra pip packages so pyright can resolve third-party imports
        required: false
        type: string
        default: ''

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyright kodistubs ruff ${{ inputs.deps }}
      - name: Ruff
        run: ruff check .
      - name: Pyright
        run: pyright
