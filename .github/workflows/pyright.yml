name: Type Check (reusable)

on:
  workflow_call:

jobs:
  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyright kodistubs
      - name: Run pyright
        run: pyright
